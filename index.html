<title>Abitur Checkliste BW</title>
<style>
:root{--bg:#f4f1eb;--card:#fff;--border:#e5e0d8;--text:#1a1a1a;--muted:#888;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}
.app-header{position:sticky;top:0;z-index:100;background:#111;color:#fff;padding:calc(var(--safe-top) + 14px) 16px 12px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.header-label{font-size:11px;opacity:.5;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.header-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.header-pct{font-size:28px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:right}
.header-pct-label{font-size:11px;opacity:.4;text-align:right}
.progress-bar-wrap{background:rgba(255,255,255,.1);border-radius:4px;height:4px;overflow:hidden;margin-bottom:12px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#60a5fa,#a78bfa);transition:width .5s ease}
.subject-tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.subject-tabs::-webkit-scrollbar{display:none}
.subject-tab{flex-shrink:0;padding:8px 14px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.subject-tab.active{background:#fff;color:#111;font-weight:700}
.subject-tab.inactive{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.filter-row{display:flex;gap:8px;padding:12px 12px 8px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;align-items:center}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid;cursor:pointer;font-size:13px;font-weight:500;transition:all .18s}
.filter-btn.active{background:#111;color:#fff;border-color:#111}
.filter-btn.inactive{background:#fff;color:#555;border-color:#ddd}
.filter-count{font-size:13px;color:var(--muted);flex-shrink:0}
.reset-btn{margin-left:auto;flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid #ddd;background:#fff;color:#aaa;font-size:12px;cursor:pointer}
.content{padding:12px 12px calc(var(--safe-bottom) + 24px)}
.section-card{background:var(--card);border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04)}
.section-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;-webkit-user-select:none}
.section-label{font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;color:#fff}
.section-title{font-size:14px;font-weight:700;color:#fff;line-height:1.3}
.section-stat{text-align:right}
.section-pct{font-size:22px;font-weight:800}
.section-count{font-size:11px;opacity:.55;color:#fff}
.section-chevron{font-size:11px;color:rgba(255,255,255,.4);transition:transform .25s;display:inline-block}
.subsection{border-top:1px solid rgba(0,0,0,.06)}
.subsection-title{padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-left:3px solid}
.item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-top:1px solid var(--border);cursor:pointer;-webkit-user-select:none;border-left:3px solid transparent;transition:background .15s}
.item:active{background:#f5f5f5}
.item.done{border-left-color:var(--ac)}
.checkbox{width:24px;height:24px;border-radius:7px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.checkbox.checked{border-color:var(--ac);background:var(--ac)}
.checkmark{color:#fff;font-size:14px;font-weight:700}
.item-text{font-size:14px;line-height:1.55;transition:color .2s}
.item-text.done{color:#bbb;text-decoration:line-through;text-decoration-color:#ccc}
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:16px;font-weight:600}
.empty-sub{font-size:13px;margin-top:6px;opacity:.7}
.install-banner{margin:0 0 14px;background:linear-gradient(135deg,#1a2e1a,#2d5a2d);color:#fff;border-radius:14px;padding:14px 16px;font-size:13px;line-height:1.5;display:flex;gap:12px;align-items:flex-start}
.install-icon{font-size:24px;flex-shrink:0}
.install-title{font-weight:700;font-size:14px;margin-bottom:4px}
.install-dismiss{margin-left:auto;font-size:18px;opacity:.6;cursor:pointer;flex-shrink:0;padding:0 4px}
</style>
</head>

</div>
<div class="content" id="mainContent"></div>

function allItems(subj){return subj.sections.flatMap(s=>s.subsections.flatMap(ss=>ss.items));}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({checked,collapsed}));}catch{}}

function updateGrandHeader(){
  const all=subjects.flatMap(s=>allItems(s));
  const done=all.filter(i=>checked[i.id]).length;
  const pct=Math.round(done/all.length*100);
  document.getElementById('grandPct').textContent=pct+'%';
  document.getElementById('grandBar').style.width=pct+'%';
}

function renderTabs(){
  const tabs=document.getElementById('subjectTabs');
  tabs.innerHTML=subjects.map(s=>{
    const items=allItems(s);
    const done=items.filter(i=>checked[i.id]).length;
    const pct=Math.round(done/items.length*100);
    const active=s.id===activeSubject;
    return `<button class="subject-tab ${active?'active':'inactive'}" onclick="switchSubject('${s.id}')">${s.emoji} ${s.name} <span style="opacity:.6;font-size:11px">${pct}%</span></button>`;
  }).join('');
}

function switchSubject(id){activeSubject=id;currentFilter='all';document.querySelectorAll('.filter-btn').forEach((b,i)=>{b.className='filter-btn '+(i===0?'active':'inactive');});render();}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.className='filter-btn inactive');btn.className='filter-btn active';render();}
function confirmReset(){if(confirm('Alle Häkchen zurücksetzen?')){checked={};save();render();}}

function toggleItem(id,accent){
  checked[id]=!checked[id];save();
  const el=document.getElementById('item-'+id);
  const cb=document.getElementById('cb-'+id);
  const txt=document.getElementById('txt-'+id);
  if(el){el.className='item'+(checked[id]?' done':'');el.style.setProperty('--ac',accent);}
  if(cb){cb.className='checkbox'+(checked[id]?' checked':'');}
  if(txt){txt.className='item-text'+(checked[id]?' done':'');}
  updateGrandHeader();renderTabs();
  if(currentFilter!=='all')setTimeout(render,300);
}

function toggleSection(id){collapsed[id]=!collapsed[id];save();render();}

function render(){
  const subj=subjects.find(s=>s.id===activeSubject);
  const items=allItems(subj);
  const visItems=items.filter(i=>currentFilter==='all'?true:currentFilter==='open'?!checked[i.id]:!!checked[i.id]);
  document.getElementById('filterCount').textContent=visItems.length+' von '+items.length;

  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone;
  let html='';
  if(isIOS&&!isStandalone&&!sessionStorage.getItem('banner-dismissed')){
    html+=`<div class="install-banner"><div class="install-icon">📲</div><div><div class="install-title">Als App installieren</div><div>Tippe auf <strong>Teilen</strong> → <strong>Zum Home-Bildschirm</strong></div></div><div class="install-dismiss" onclick="this.closest('.install-banner').remove();sessionStorage.setItem('banner-dismissed','1')">✕</div></div>`;
  }

  let anyVisible=false;
  subj.sections.forEach(sec=>{
    const secItems=sec.subsections.flatMap(ss=>ss.items);
    const visSecItems=secItems.filter(i=>currentFilter==='all'?true:currentFilter==='open'?!checked[i.id]:!!checked[i.id]);
    if(visSecItems.length===0)return;
    anyVisible=true;
    const secDone=secItems.filter(i=>checked[i.id]).length;
    const secPct=Math.round(secDone/secItems.length*100);
    const isCollapsed=collapsed[sec.id];
    const pctColor=secPct===100?'#4ade80':sec.accent;
    html+=`<div class="section-card"><div class="section-header" style="background:${sec.color}" onclick="toggleSection('${sec.id}')"><div><div class="section-label">Themenbereich</div><div class="section-title">${sec.title}</div></div><div class="section-stat"><div class="section-pct" style="color:${pctColor}">${secPct}%</div><div class="section-count">${secDone}/${secItems.length}</div><div class="section-chevron" style="transform:${isCollapsed?'rotate(0deg)':'rotate(180deg)'}">▼</div></div></div>`;
    if(!isCollapsed){
      sec.subsections.forEach(sub=>{
        const subVis=sub.items.filter(i=>currentFilter==='all'?true:currentFilter==='open'?!checked[i.id]:!!checked[i.id]);
        if(subVis.length===0)return;
        html+=`<div class="subsection"><div class="subsection-title" style="color:${sec.color};background:${sec.light};border-color:${sec.accent}">${sub.title}</div>`;
        subVis.forEach(item=>{
          const isDone=!!checked[item.id];
          html+=`<div class="item${isDone?' done':''}" id="item-${item.id}" style="--ac:${sec.accent}" onclick="toggleItem('${item.id}','${sec.accent}')"><div class="checkbox${isDone?' checked':''}" id="cb-${item.id}"></div><div class="item-text${isDone?' done':''}" id="txt-${item.id}">${item.text}</div></div>`;
        });
        html+=`</div>`;
      });
    }
    html+=`</div>`;
  });
  if(!anyVisible){html+=`<div class="empty"><div class="empty-icon">${currentFilter==='done'?'📭':'🎉'}</div><div class="empty-text">${currentFilter==='done'?'Noch nichts gelernt':'Alles gelernt!'}</div><div class="empty-sub">${currentFilter==='done'?'Fang an abzuhaken!':'Glückwunsch!'}</div></div>`;}
  document.getElementById('mainContent').innerHTML=html;
  updateGrandHeader();renderTabs();
}

render();
</script>
